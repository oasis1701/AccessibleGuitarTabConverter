<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parser Test - AccessibleGuitarTabConverter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-case {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-case h3 {
            margin-top: 0;
        }
        .input-tab {
            background: #f5f5f5;
            padding: 10px;
            margin: 10px 0;
            font-family: monospace;
            white-space: pre;
            overflow-x: auto;
        }
        .output {
            background: #e8f5e9;
            padding: 10px;
            margin: 10px 0;
            white-space: pre-wrap;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            margin: 10px 0;
        }
        .success {
            color: #2e7d32;
        }
        .warning {
            color: #f57c00;
        }
    </style>
</head>
<body>
    <h1>Parser Test Results</h1>
    <div id="test-results"></div>

    <script type="module">
        import { TabConverter } from './src/modules/converter/TabConverter.js';
        import * as testTabs from './test-tabs.js';

        const converter = new TabConverter();
        const resultsDiv = document.getElementById('test-results');

        function runTest(name, tabText, description) {
            const testDiv = document.createElement('div');
            testDiv.className = 'test-case';
            
            const title = document.createElement('h3');
            title.textContent = `Test: ${name}`;
            testDiv.appendChild(title);
            
            const desc = document.createElement('p');
            desc.textContent = description;
            testDiv.appendChild(desc);
            
            const inputDiv = document.createElement('div');
            inputDiv.className = 'input-tab';
            inputDiv.textContent = tabText;
            testDiv.appendChild(inputDiv);
            
            try {
                const result = converter.convert(tabText, {
                    includeTiming: true,
                    verboseMode: true,
                    useStringNames: true,
                    includeTechniqueDetails: true
                });
                
                const outputDiv = document.createElement('div');
                outputDiv.className = 'output';
                outputDiv.textContent = result;
                testDiv.appendChild(outputDiv);
                
                // Check for specific issues
                if (name === 'E and B String Ambiguity' && result.includes('high E') && result.includes('low E')) {
                    const success = document.createElement('p');
                    success.className = 'success';
                    success.textContent = '✓ Successfully distinguished between high E and low E strings';
                    testDiv.appendChild(success);
                }
                
                if (name === '7-String with Low B' && result.includes('low B')) {
                    const success = document.createElement('p');
                    success.className = 'success';
                    success.textContent = '✓ Successfully identified low B string';
                    testDiv.appendChild(success);
                }
                
                if (name === 'Muted Notes' && result.includes('muted')) {
                    const success = document.createElement('p');
                    success.className = 'success';
                    success.textContent = '✓ Successfully parsed muted notes';
                    testDiv.appendChild(success);
                }
                
                if (name === 'Extended Techniques' && (result.includes('hammer-on') || result.includes('pull-off') || result.includes('bend'))) {
                    const success = document.createElement('p');
                    success.className = 'success';
                    success.textContent = '✓ Successfully identified techniques';
                    testDiv.appendChild(success);
                }
                
                if (name === 'Advanced Techniques' && (result.includes('ghost') || result.includes('harmonic'))) {
                    const success = document.createElement('p');
                    success.className = 'success';
                    success.textContent = '✓ Successfully identified ghost notes and/or harmonics';
                    testDiv.appendChild(success);
                }
                
            } catch (error) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error';
                errorDiv.textContent = `Error: ${error.message}`;
                testDiv.appendChild(errorDiv);
            }
            
            resultsDiv.appendChild(testDiv);
        }

        // Run all tests
        runTest('E and B String Ambiguity', testTabs.ambiguousStringTest, 'Tests if parser correctly distinguishes between high E and low E strings');
        runTest('7-String with Low B', testTabs.sevenStringTest, 'Tests 7-string guitar parsing with low B string');
        runTest('Muted Notes', testTabs.mutedNotesTest, 'Tests parsing of muted (x) and open (o) string notations');
        runTest('Extended Techniques', testTabs.techniquesTest, 'Tests expanded technique detection range');
        runTest('Advanced Techniques', testTabs.advancedTechniquesTest, 'Tests ghost notes (parentheses) and harmonics (<>)');
        runTest('Invalid Fret Numbers', testTabs.invalidFretsTest, 'Tests handling of invalid fret numbers (should skip fret 99)');

        // Summary
        const summary = document.createElement('div');
        summary.style.marginTop = '30px';
        summary.innerHTML = '<h2>Summary</h2><p>Check the results above to verify all parser fixes are working correctly.</p>';
        resultsDiv.appendChild(summary);
    </script>
</body>
</html>
